kind = "web"
previewPath = "/"
title = "نور - لوحة تحكم الوكيل"
version = "1.0.0"
id = "artifacts/nour-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25079

[services.development]
run = "pnpm --filter @workspace/nour-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nour-dashboard", "run", "build" ]
publicDir = "artifacts/nour-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25079"
BASE_PATH = "/"
