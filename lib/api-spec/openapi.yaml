openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Nour WhatsApp Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: whatsapp
    description: WhatsApp connection management
  - name: contacts
    description: Contact management
  - name: messages
    description: Message management
  - name: settings
    description: Application settings
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /whatsapp/status:
    get:
      operationId: getWhatsappStatus
      tags: [whatsapp]
      summary: Get WhatsApp connection status
      responses:
        "200":
          description: Status info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappStatus"

  /whatsapp/qr:
    get:
      operationId: getWhatsappQr
      tags: [whatsapp]
      summary: Get QR code for WhatsApp connection
      responses:
        "200":
          description: QR code data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappQr"

  /whatsapp/disconnect:
    post:
      operationId: disconnectWhatsapp
      tags: [whatsapp]
      summary: Disconnect WhatsApp session
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /contacts:
    get:
      operationId: getContacts
      tags: [contacts]
      summary: List all contacts
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Contacts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactsListResponse"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get contact with message history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDetail"

  /contacts/{id}/block:
    post:
      operationId: toggleBlockContact
      tags: [contacts]
      summary: Block or unblock a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockContactBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages:
    get:
      operationId: getMessages
      tags: [messages]
      summary: List all messages
      parameters:
        - name: contactId
          in: query
          schema:
            type: integer
        - name: direction
          in: query
          schema:
            type: string
            enum: [inbound, outbound]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesListResponse"

    delete:
      operationId: clearMessages
      tags: [messages]
      summary: Delete all messages (optionally for one contact)
      parameters:
        - name: contactId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClearDataResponse"

  /contacts/clear:
    delete:
      operationId: clearContacts
      tags: [contacts]
      summary: Delete all contacts and their messages
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClearDataResponse"

  /messages/send:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages/broadcast:
    post:
      operationId: broadcastMessage
      tags: [messages]
      summary: Broadcast a message to all contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastMessageBody"
      responses:
        "200":
          description: Broadcast sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResult"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    post:
      operationId: updateSettings
      tags: [settings]
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Settings"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /settings/models/gemini:
    get:
      operationId: getGeminiModels
      tags: [settings]
      summary: Fetch available Gemini models for a given API key
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of available models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModelsResponse"
        "400":
          description: Invalid or missing key

  /settings/models/groq:
    get:
      operationId: getGroqModels
      tags: [settings]
      summary: Fetch available Groq models for a given API key
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of available models
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModelsResponse"
        "400":
          description: Invalid or missing key

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /stats/activity:
    get:
      operationId: getActivity
      tags: [stats]
      summary: Get message activity for chart (last 7 days)
      responses:
        "200":
          description: Activity data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityPoint"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    WhatsappStatus:
      type: object
      properties:
        connected:
          type: boolean
        phone:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        status:
          type: string
          enum: [connected, disconnected, connecting, qr_ready]
      required: [connected, status]

    WhatsappQr:
      type: object
      properties:
        qr:
          type: string
          nullable: true
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    Contact:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        name:
          type: string
          nullable: true
        firstSeen:
          type: string
        lastSeen:
          type: string
        messageCount:
          type: integer
        isBlocked:
          type: boolean
        lastMessage:
          type: string
          nullable: true
      required: [id, phone, firstSeen, lastSeen, messageCount, isBlocked]

    ContactsListResponse:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [contacts, total, page, totalPages]

    Message:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: integer
        contactPhone:
          type: string
        contactName:
          type: string
          nullable: true
        content:
          type: string
        direction:
          type: string
          enum: [inbound, outbound]
        aiModel:
          type: string
          nullable: true
        timestamp:
          type: string
      required: [id, contactId, contactPhone, content, direction, timestamp]

    MessagesListResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required: [messages, total, page, totalPages]

    ContactDetail:
      type: object
      properties:
        contact:
          $ref: "#/components/schemas/Contact"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required: [contact, messages]

    SendMessageBody:
      type: object
      properties:
        phone:
          type: string
        content:
          type: string
      required: [phone, content]

    BroadcastMessageBody:
      type: object
      properties:
        content:
          type: string
      required: [content]

    BroadcastResult:
      type: object
      properties:
        success:
          type: boolean
        sent:
          type: integer
        failed:
          type: integer
      required: [success, sent, failed]

    BlockContactBody:
      type: object
      properties:
        blocked:
          type: boolean
      required: [blocked]

    AiModelOption:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
      required: [id, name, description]

    AiModelsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/AiModelOption"
      required: [models]

    Settings:
      type: object
      properties:
        ownerName:
          type: string
        ownerEmail:
          type: string
        ownerPhone:
          type: string
        adminPhone:
          type: string
        projectName:
          type: string
        projectDescription:
          type: string
        projectLink:
          type: string
        geminiApiKey:
          type: string
        geminiModel:
          type: string
        groqApiKey:
          type: string
        groqModel:
          type: string
        aiModel:
          type: string
          enum: [gemini, groq]
        agentPersonality:
          type: string
        autoReply:
          type: boolean
        maintenanceMode:
          type: boolean
        maintenanceMessage:
          type: string
      required: [aiModel, autoReply]

    Stats:
      type: object
      properties:
        totalContacts:
          type: integer
        totalMessages:
          type: integer
        messagesSent:
          type: integer
        messagesReceived:
          type: integer
        blockedContacts:
          type: integer
        todayMessages:
          type: integer
        activeContacts:
          type: integer
      required: [totalContacts, totalMessages, messagesSent, messagesReceived, blockedContacts, todayMessages, activeContacts]

    ActivityPoint:
      type: object
      properties:
        date:
          type: string
        inbound:
          type: integer
        outbound:
          type: integer
      required: [date, inbound, outbound]

    ClearDataResponse:
      type: object
      properties:
        success:
          type: boolean
        deleted:
          type: integer
        message:
          type: string
      required: [success, deleted, message]
